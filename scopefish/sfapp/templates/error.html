{% extends "base.html" %}
{% block title %}{{ error_code }} - {{ error_title }}{% endblock %}

{% block body %}
<div class="container">
    <div class="empty-state" style="padding: 4rem 0;">
        <div class="empty-icon" style="font-size: 3rem;">
            {% if error_code == 404 %}&#x1F50D;{% else %}&#x26A0;{% endif %}
        </div>
        <h2 style="font-family: var(--font-heading); margin: 1rem 0 0.5rem;">{{ error_code }} &mdash; {{ error_title }}</h2>
        <p style="color: var(--text-muted); max-width: 400px; margin: 0 auto 2rem;">{{ error_message }}</p>
        <a href="{{ prefix }}/" class="btn-primary">&larr; Back to Scopefish</a>
    </div>
</div>
{% endblock %}
